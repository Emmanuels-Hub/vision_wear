name: vision_wear
description: "AI-powered eyewear assistant connecting to ESP32-CAM for obstacle and object detection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_mlkit_object_detection: ^0.14.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  http: ^1.2.2
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1
  vibration: ^2.0.1
  intl: ^0.20.1
  camera: ^0.11.0+2
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_vision: ^2.0.0
  ultralytics_yolo: ^0.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
   - assets/labels.txt
   - assets/model.tflite
